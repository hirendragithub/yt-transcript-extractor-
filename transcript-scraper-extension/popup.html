<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 360px; padding: 16px; font-family: system-ui, sans-serif; margin: 0; background: #1e1e2e; color: #cdd6f4; }
        button { width: 100%; padding: 10px; margin-bottom: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #89b4fa; color: #1e1e2e; }
        .btn-secondary { background: #313244; color: #cdd6f4; }
        .status { background: #11111b; padding: 10px; border-radius: 8px; font-size: 12px; font-family: monospace; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
        .preview { background: #11111b; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 12px; display: none; }
        .preview h4 { margin: 0 0 8px 0; color: #89b4fa; }
        .preview p { margin: 0; color: #a6adc8; }
    </style>
    <title>Transcript Scraper</title>
</head>
<body>
    <button id="scrapeBtn" class="btn-primary">▶ Scrape Transcripts</button>
    <div id="status" class="status">Ready.</div>
    <div id="preview" class="preview"></div>
    <button id="downloadBtn" class="btn-secondary" style="display:none;">📥 Download JSON</button>
    <script src="popup.js"></script>
</body>
</html>
