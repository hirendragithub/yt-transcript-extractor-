<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>YouTube Transcript Scraper</title>
</head>
<body>
    <div class="shell">
        <header class="toolbar">
            <div class="app-mark" aria-hidden="true">
                <span class="app-mark-glyph"></span>
            </div>
            <div class="button-container">
                <button id="scrapeBtn" class="button button-primary">Scrape All Transcripts</button>
                <button id="downloadBtn" class="button button-secondary" style="display: none;">Download JSON</button>
            </div>
        </header>

        <!-- PROGRESS BAR (make sure this is present) -->
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <p id="status" class="status">Ready.</p>
        <div id="transcript-output" class="transcript-box"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
